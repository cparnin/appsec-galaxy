name: Self-Scan

# AppSec Galaxy scanning itself, dogfood-style.
# Rule-based scanners run on every push/PR (free). The AI deep scan runs
# only on the weekly schedule (~$0.35/run) so we keep dogfooding it without
# paying per-push. Auto-remediation is OFF (scan-only Mode 4) so this job
# can never open PRs against ourselves. SARIF is included in the uploaded
# artifact; the Security-tab upload step is intentionally omitted because
# it requires GitHub Advanced Security (paid on private repos).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 13 * * 1'  # Mondays 13:00 UTC: weekly AI deep scan

jobs:
  self-scan:
    name: appsec-galaxy self-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # gitleaks scans git history

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies (includes semgrep)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pip install --no-deps .

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567  # v0.2.6 (post-incident safe version)
        with:
          version: v0.72.0  # pinned; bump deliberately (v0.69.4 was a malicious release, never auto-latest)

      - name: Setup Gitleaks
        uses: gacts/gitleaks@c9a0338361dc45a01aa7ebaaa5330179f3c62873  # v1.3.2
        with:
          version: 8.30.1  # pinned; matches action.yml (supply-chain hygiene)
          run: false  # Just install, don't run yet

      - name: Run AppSec Galaxy scan (scan-only, no auto-fix)
        env:
          APPSEC_SCAN_LEVEL: critical-high
          APPSEC_AUTO_FIX: "false"          # no PRs from the self-scan
          APPSEC_AUTO_FIX_MODE: "4"         # scan only
          APPSEC_CODE_QUALITY: "true"
          APPSEC_DEBUG: "false"
          # AI deep scan: weekly schedule only (cost control); rule-based
          # scanners still run on every push/PR
          APPSEC_AI_SCAN: ${{ github.event_name == 'schedule' && secrets.OPENAI_API_KEY != '' && 'true' || 'false' }}
          AI_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m appsec_galaxy.main

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: appsec-galaxy-self-scan-outputs
          path: outputs/
          retention-days: 90

      - name: Fail on critical findings
        run: python scripts/fail_on_critical.py
